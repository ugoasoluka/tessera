apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "temporal-worker.fullname" . }}
  labels:
    {{- include "temporal-worker.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}

  secretStoreRef:
    kind: {{ .Values.externalSecrets.storeRef.kind }}
    name: {{ .Values.externalSecrets.storeRef.name }}

  target:
    name: {{ include "temporal-worker.fullname" . }}
    creationPolicy: Owner

  data:
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: tessera/github-pat

    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: tessera/slack-bot-token

    - secretKey: LLM_API_KEY
      remoteRef:
        key: tessera/anthropic-api-key