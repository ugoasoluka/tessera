image:
  repository: 851276831101.dkr.ecr.us-east-2.amazonaws.com/tessera-slack-bot
  tag: v26.4.26.554
  pullPolicy: IfNotPresent

replicaCount: 1

# Temporal connection — same as worker, both connect to the same cluster
temporal:
  address: tessera-temporal-frontend.temporal.svc.cluster.local:7233
  namespace: tessera
  taskQueue: tessera-coding-agent

# ESO ClusterSecretStore (created once in helm/temporal/external-secret.yaml)
externalSecrets:
  storeRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  refreshInterval: 1h

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]